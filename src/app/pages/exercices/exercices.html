<div class="flex h-screen bg-slate-50 font-sans">
    
    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Contenu Principal -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <main class="flex-1 overflow-y-auto p-8">

            <app-page-header
                breadcrumbActive="Gestion des exercices"
                title="Gestion des Exercices"
                subtitle="Gérez l'ensemble de vos exercices en toute simplicité."
                buttonText="Ouvrir un exercice"
                buttonIcon="fa-plus"
                (actionClicked)="onOuvrirExercice()">

                <div exercice-selector class="flex-1 relative">
                    <i class="fa-solid fa-search text-white/40 absolute left-4 top-1/2 -translate-y-1/2 text-sm"></i>
                    <input type="text" placeholder="Rechercher un exercice..." 
                           class="w-full bg-white/10 text-white text-sm py-2.5 pl-11 pr-4 rounded-xl border border-white/10 focus:ring-1 focus:ring-white/30 placeholder:text-white/40 outline-none min-w-[280px]">
                </div>
            </app-page-header>

            <!-- Conteneur principal -->
            <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-6 flex flex-col min-h-[400px]">
                
                <!-- Table Container Unifié -->
                <div class="w-full overflow-x-auto pb-4">
                    <table class="syndify-table">
                        <thead>
                            <tr>
                                <th>Identifiant</th>
                                <th class="text-center">Début</th>
                                <th class="text-center">Fin</th>
                                <th class="text-center">Périodicité</th>
                                <th class="text-center">Statut</th>
                                <th class="text-right">Outils</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- État vide (Empty state) -->
                            <tr>
                                <td colspan="6" class="py-24 text-center border-t border-slate-50">
                                    <div class="flex flex-col items-center justify-center">
                                        <div class="bg-slate-50 rounded-2xl w-24 h-24 flex items-center justify-center mb-4 shadow-inner border border-slate-100">
                                            <i class="fa-regular fa-folder text-5xl text-slate-300"></i>
                                        </div>
                                        <p class="text-[14px] text-slate-400 font-medium italic">Aucun exercice trouvé.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="mt-auto pt-6 border-t border-slate-100 flex items-center justify-between text-sm text-slate-500 font-medium">
                    <button class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-50 text-slate-600 transition-colors border border-transparent hover:border-slate-200">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i>
                        Précédent
                    </button>
                    <span class="text-slate-800 font-bold bg-slate-50 px-3 py-1 rounded-md border border-slate-100">Page 1 / 1</span>
                    <button class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-50 text-slate-600 transition-colors border border-transparent hover:border-slate-200">
                        Suivant
                        <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </button>
                </div>

            </div>

        </main>
    </div>
</div>
