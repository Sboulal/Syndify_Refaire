<div [ngClass]="{
      'bg-[#13243c]': role === 'syndic',
      'bg-[#1a434b]': role === 'coproprietaire'
    }" 
    class="w-64 min-h-screen text-white flex flex-col transition-colors duration-300 relative">
    
    <!-- Bouton flèche pour réduire le menu -->
    <button class="absolute -right-3 top-8 w-6 h-6 bg-[#1a434b] border border-white/20 rounded-full flex items-center justify-center z-10 hover:bg-[#13243c] transition shadow-md cursor-pointer">
        <i class="fa-solid fa-chevron-left text-[10px] text-white"></i>
    </button>

    <!-- Header (Ma copropriété) -->
    <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 bg-white text-[#1a434b] rounded-lg flex items-center justify-center font-bold">
            <i class="fa-solid fa-water"></i>
        </div>
        <div class="flex flex-col">
            <span class="font-extrabold text-[15px] tracking-wide leading-tight">Ma copropriété</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 mt-2 space-y-1 overflow-y-auto pb-4">
        
        <!-- Tableau de bord -->
        <a routerLink="/syndic/dashboard" routerLinkActive="bg-white/10 font-bold text-white shadow-inner" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium text-gray-300 hover:text-white">
            <i class="fa-solid fa-house text-[16px] w-6 text-center"></i> 
            <span>Tableau de bord</span>
        </a>

        <!-- Ma copropriété (Menu déroulant) -->
        <div class="pt-2">
            <!-- Bouton (click) -->
            <button (click)="isCoproOpen = !isCoproOpen" class="w-full flex items-center justify-between px-4 py-3 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium" [ngClass]="isCoproOpen ? 'text-white bg-white/5' : 'text-gray-300 hover:text-white'">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-box text-[16px] w-6 text-center"></i> 
                    <span>Ma copropriété</span>
                </div>
                <i class="fa-solid text-[10px]" [ngClass]="isCoproOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>
            
            <!-- Sous-menu Ma copropriété -->
            <div *ngIf="isCoproOpen" class="pl-12 pr-4 py-2 space-y-3 mt-1 mb-2">
                <a routerLink="/syndic/lots" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Gestion des biens
                </a>
                <a routerLink="/syndic/copro-listes" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Liste-copropriétaires
                </a>
                <a routerLink="/syndic/cles" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Clés de répartition
                </a>
                <a routerLink="/syndic/impayee" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Les impayés
                </a>
            </div>
        </div>

        <!-- Financement (Menu déroulant) -->
        <div class="pt-1">
            <button (click)="isFinanceOpen = !isFinanceOpen" class="w-full flex items-center justify-between px-4 py-3 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium" [ngClass]="isFinanceOpen ? 'text-white bg-white/5' : 'text-gray-300 hover:text-white'">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-coins text-[16px] w-6 text-center"></i> 
                    <span>Financement</span>
                </div>
                <i class="fa-solid text-[10px]" [ngClass]="isFinanceOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>

            <!-- Sous-menu Financement -->
            <div *ngIf="isFinanceOpen" class="pl-12 pr-4 py-2 space-y-3 mt-1 mb-2">
                <a routerLink="/syndic/budgets" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Budgets & dépenses
                </a>
                <a routerLink="/syndic/appels-fonds" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Appels de fonds
                </a>
                <a routerLink="/syndic/simuler-budget" routerLinkActive="text-white font-bold" class="block text-[13px] font-medium text-gray-400 flex items-center gap-3 hover:text-white transition">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Simuler un budget
                </a>
            </div>
        </div>

        <!-- Exercices & clôtures -->
        <a routerLink="/syndic/exercices" routerLinkActive="bg-white/10 font-bold text-white shadow-inner" class="flex items-center gap-3 px-4 py-3 mt-1 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium text-gray-300 hover:text-white">
            <i class="fa-solid fa-scissors text-[16px] w-6 text-center"></i> 
            <span>Exercices & clôture</span>
        </a>

        <!-- Documents -->
        <a routerLink="/syndic/documents" routerLinkActive="bg-white/10 font-bold text-white shadow-inner" class="flex items-center gap-3 px-4 py-3 mt-1 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium text-gray-300 hover:text-white">
            <i class="fa-regular fa-folder text-[16px] w-6 text-center"></i> 
            <span>Documents</span>
        </a>

    </nav>

    <!-- Footer / Version -->
    <div class="p-6 mt-auto">
        <div class="flex flex-col">
            <span class="font-bold text-sm text-white">Version actuelle</span>
            <span class="text-[11px] text-gray-400 mt-1">1.12.42 - <a href="#" class="text-white underline hover:text-gray-200 transition">voir les notes</a></span>
        </div>
    </div>

</div>
