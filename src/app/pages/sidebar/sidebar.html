<div [ngClass]="{
      'bg-[#13243c]': role === 'syndic',
      'bg-[#1a434b]': role === 'coproprietaire'
    }" 
    class="w-64 min-h-screen text-white flex flex-col transition-colors duration-300">
    
    <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="flex flex-col">
            <span class="font-extrabold text-[15px] tracking-wide leading-tight">SÉCURITÉ</span>
            <span class="text-[10px] text-blue-200 tracking-widest font-semibold">
                {{ role === 'syndic' ? 'SYNDIC' : 'COPROPRIÉTAIRE' }}
            </span>
        </div>
    </div>

    <nav class="flex-1 px-4 mt-6 space-y-1">
        @for (item of menuItems; track item.title) {
            <a [routerLink]="item.link" 
               class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors text-sm font-medium text-gray-200 hover:text-white"
               routerLinkActive="bg-white/20 font-bold text-white shadow-inner">
               
               <i [class]="item.icon + ' text-[16px] w-6 text-center'"></i> 
               
               <span>{{ item.title }}</span>
            </a>
        }
    </nav>

    @if (role === 'syndic') {
        <div class="p-4">
            <button class="w-full bg-[#307077] hover:bg-[#255c62] text-white py-2.5 rounded-md text-sm font-semibold transition-colors shadow-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Nouveau Signalement
            </button>
        </div>
    }
</div>
